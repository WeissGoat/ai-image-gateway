# AI Image Gateway 配置模板
# 复制为 config.yaml 并填入实际值。
# 凭证字段支持 ${ENV_VAR} 语法引用环境变量。

default_provider:
  generate: mock          # 可改为 novelai
  image_to_image: mock    # 可改为 openai_images / openai_chat_image / gemini_chat_image / grok_chat_image
  inpaint: mock           # 可改为 novelai
  upscale: mock

providers:
  mock:
    enabled: true
    settings:
      bg_color: "#2a2a3d"
      text_color: "#e0c878"

  novelai:
    enabled: true        # 启用时改为 true
    auth:
      # 凭证优先级:
      # access_token: ${NAI_ACCESS_TOKEN}   # 直接提供 token；未设置时可走本机 client.py fallback
      # client_py_path: F:\my_project\new\tags_machine\novelai\client.py
      # access_key: ${NAI_ACCESS_KEY}       # access_key, 自动 login
      username: ${NAI_USERNAME}             # 账号密码, 自动 hash + login
      password: ${NAI_PASSWORD}
    settings:
      model: nai-diffusion-4-5-full         # 模型选择
      sampler: k_euler                      # 采样器
      scheduler: native                     # 调度器
      steps: 28                             # 步数
      cfg: 5.0                              # CFG scale
      cfg_rescale: 0.0
      uncond_scale: 1.0
      uc_preset: 3
      smea: none                            # none / SMEA / SMEA+DYN
      variety: false
      decrisper: false
      limit_opus_free: true                 # Opus 免费限制
      timeout: 120                          # 超时秒数
      retry: 3                              # 重试次数

  # gemini:
  #   enabled: false
  #   auth:
  #     api_key: ${GEMINI_API_KEY}
  #   settings:
  #     model: imagen-4.0-generate-001
  #     safety_filter: block_none

  # OpenAI-compatible Images API endpoint:
  # - generate: /v1/images/generations
  # - image_to_image: /v1/images/edits reference image edit
  # This is not the local masked inpaint capability.
  openai_images:
    enabled: false
    auth:
      api_key: ${AI_IMAGE_PROXY_KEY}
    settings:
      base_url: https://proxy.example.com/v1
      endpoint: /images/generations
      edit_endpoint: /images/edits
      model: gpt-image-2
      response_format: b64_json
      size: 1024x1024
      quality: high
      output_format: png
      timeout: 120
      retry: 2

  # OpenAI-compatible chat endpoint, for image models proxied through /v1/chat/completions.
  gemini_chat_image:
    enabled: false
    auth:
      api_key: ${AI_IMAGE_PROXY_KEY}
    settings:
      base_url: https://proxy.example.com/v1
      endpoint: /chat/completions
      model: gemini-3.1-flash-image
      temperature: 0.2
      timeout: 120
      retry: 2

  grok_chat_image:
    enabled: false
    auth:
      api_key: ${AI_IMAGE_PROXY_KEY}
    settings:
      base_url: https://proxy.example.com/v1
      endpoint: /chat/completions
      model: grok-imagine-image-lite
      temperature: 0.2
      timeout: 120
      retry: 2

logging:
  level: INFO
  # file: ./logs/ai_image_gateway.log
